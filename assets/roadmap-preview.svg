<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Design-to-AI Demo Coach six-week roadmap preview</title>
  <desc id="desc">A six-week roadmap from design background to a portfolio-ready AI demo.</desc>
